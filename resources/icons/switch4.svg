<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Lead lines -->
  <line x1="4" y1="14" x2="14" y2="14" stroke="#333" stroke-width="2.5"/>
  <line x1="4" y1="34" x2="14" y2="34" stroke="#333" stroke-width="2.5"/>
  <line x1="34" y1="14" x2="44" y2="14" stroke="#333" stroke-width="2.5"/>
  <line x1="34" y1="34" x2="44" y2="34" stroke="#333" stroke-width="2.5"/>
  <!-- Contact dots -->
  <circle cx="14" cy="14" r="3" fill="#333"/>
  <circle cx="14" cy="34" r="3" fill="#333"/>
  <circle cx="34" cy="14" r="3" fill="#333"/>
  <circle cx="34" cy="34" r="3" fill="#333"/>
  <!-- Connection lines (straight) -->
  <line x1="14" y1="14" x2="34" y2="14" stroke="#060" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="14" y1="34" x2="34" y2="34" stroke="#060" stroke-width="2.5" stroke-linecap="round"/>
</svg>
