<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g stroke="#222" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Gate lead -->
    <line x1="8" y1="32" x2="22" y2="32"/>
    <!-- Gate plate -->
    <line x1="22" y1="16" x2="22" y2="48"/>
    <!-- Channel body -->
    <line x1="28" y1="16" x2="28" y2="48"/>
    <!-- Drain connection -->
    <line x1="28" y1="20" x2="44" y2="20"/>
    <line x1="44" y1="8" x2="44" y2="20"/>
    <!-- Source connection -->
    <line x1="28" y1="44" x2="44" y2="44"/>
    <line x1="44" y1="44" x2="44" y2="56"/>
    <!-- Body to source -->
    <line x1="28" y1="32" x2="44" y2="32"/>
    <line x1="44" y1="32" x2="44" y2="44"/>
  </g>
  <!-- Arrow (N-channel: pointing toward channel) -->
  <polygon points="33,32 40,28 40,36" fill="#222"/>
</svg>
