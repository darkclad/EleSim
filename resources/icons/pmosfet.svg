<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <g stroke="#222" stroke-width="2" fill="none" stroke-linecap="round">
    <!-- Gate lead -->
    <line x1="8" y1="32" x2="18" y2="32"/>
    <!-- Inversion bubble -->
    <circle cx="21" cy="32" r="3" fill="white" stroke="#222" stroke-width="1.5"/>
    <!-- Gate plate -->
    <line x1="25" y1="16" x2="25" y2="48"/>
    <!-- Channel body -->
    <line x1="31" y1="16" x2="31" y2="48"/>
    <!-- Source connection (top) -->
    <line x1="31" y1="20" x2="47" y2="20"/>
    <line x1="47" y1="8" x2="47" y2="20"/>
    <!-- Drain connection (bottom) -->
    <line x1="31" y1="44" x2="47" y2="44"/>
    <line x1="47" y1="44" x2="47" y2="56"/>
    <!-- Body to source -->
    <line x1="31" y1="32" x2="47" y2="32"/>
    <line x1="47" y1="20" x2="47" y2="32"/>
  </g>
  <!-- Arrow (P-channel: pointing away from channel) -->
  <polygon points="41,32 34,28 34,36" fill="#222"/>
</svg>
